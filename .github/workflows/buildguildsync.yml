name: Build GuildSync

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.23.x'
  NODE_VERSION: '24'
  WAILS_VERSION: 'v2.12.0'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            artifact_name: GuildSync-windows-amd64
            wails_args: ''
          - name: macos-universal
            os: macos-latest
            artifact_name: GuildSync-macos
            wails_args: ''
          - name: linux-amd64
            os: ubuntu-24.04
            artifact_name: GuildSync-linux-amd64
            wails_args: '-tags webkit2_41'

    defaults:
      run:
        working-directory: GO/GuildSync-Frontend-Client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: GO/GuildSync-Frontend-Client/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: GO/GuildSync-Frontend-Client/frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
        working-directory: .

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: GO/GuildSync-Frontend-Client/frontend

      - name: Tidy Go modules
        run: go mod tidy

      - name: Build Wails application
        shell: bash
        run: |
          wails build -clean ${{ matrix.wails_args }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: GO/GuildSync-Frontend-Client/build/bin/**
          if-no-files-found: error
